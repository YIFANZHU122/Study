<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            width: 500px;
            height: 500px;
            background-color: pink;
            position: relative;
            left: 100px;
            top: 100px;
        }
        .child{
            width: 200px;
            height: 200px;
            background-color: red;
        }
        .box{
             width: 200px;
            height: 200px;
            background-color: rgb(80, 178, 50);
        }
    </style>
</head>
<body>
    <div class ="parent">
        <div class="child">
            我是子元素
        </div>
        <div class ="box"></div>
    </div>
</body>
</html>
