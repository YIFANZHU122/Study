<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            width: 500px;
            height: 500px;
            background-color: pink;
            position: relative;

        }
        .child{
            width: 200px;
            height: 200px;
            background-color: red;
            position: absolute;
        }
        .box{
            width: 300px;
            height: 300px;
            background-color: rgb(80, 178, 50);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%) translateY(-50%);

        }
    </style>
</head>
<body>
    <div class ="parent">
        <div class="child">
            我是子元素
        </div>
    </div>
    <div class ="box">hello world</div>
</body>
</html>
