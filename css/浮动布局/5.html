<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        li{
            width: 300px;
            height: 100px;
            float: left;
        }
        .list {
            overflow: hidden;
        }

        li:nth-child(1){
            background-color: aqua;
        }
        li:nth-child(2){
            background-color: rgb(0, 255, 64);
        }
        li:nth-child(3){
            background-color: rgb(179, 0, 255);
        }

         /* .title::before{
            content: '111';
        }  */
          /* .list::after{
            content: '';
            clear:both;
            display: block;
        } */

    </style>
</head>
<body>
    <ul class="list">
        <li>1</li>
        <li>2</li>
        <li>3</li> 
    </ul>
    <h2 class="title">
        <span>hello</span>
    </h2>
</body>
</html>
