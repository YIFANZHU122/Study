<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .list {
            font-size: 0;
        }
        li{
            width: 300px;
            height: 100px;
            display: inline-block; /*inline  行内元素,无宽高*/
            font-size: 20px;
        }
        
        li:nth-child(1){
            background-color: aqua;
        }
        li:nth-child(2){
            background-color: rgb(0, 255, 64);
        }
        li:nth-child(3){
            background-color: rgb(179, 0, 255);
        }
        
    </style>
</head>
<body>
    <ul class="list">
        <li>1</li>
        <li>2</li>
        <li>3</li> 
        <!-- <li>1</li><li>2</li><li>3</li>
        
            <li>1</li>
            <li>2</li>
            <li>3</li>    这样有空格,换行算空格  -> 解决：font-size:0  -->
    </ul>
</body>
</html>
