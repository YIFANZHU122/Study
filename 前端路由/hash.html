<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <ul>
        <li>
            <a href="#/home">首页</a>
        </li>
        <li>
            <a href="#/list">列表页</a>
        </li>
    </ul>

    <div id="root"></div>
    <script>
        const routes = [
            {
                path: '/home',
                component: () => {
                    return '这是首页'
                }
            },
            {
                path: '/list',
                component: () => {
                    return '这是列表页'
                }
            }
        ]
        // 监听 hashchange 事件
        window.addEventListener('hashchange', function () {
            console.log('hash 变化了', window.location.hash)
            renderView(location.hash)
        })

        function renderView(url) {
            const index = routes.findIndex(item => {
                return ('#' + item.path) === url
            })
            let routerView = document.getElementById('root')
            routerView.innerHTML = routes[index].component()
        }
        window.addEventListener('DOMcontentLoaded', function () {
            renderView(location.hash)
        })
    </script>
</body>

</html>
