<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="submitBtn">提交</button>
    <script>
        const btn = document.getElementById('submitBtn')


        function hanle(e) {
             console.log('向后端发请求')
        }
 
        btn.addEventListener('click',debounce(hanle,1000))

        function debounce(fn, wait) {
            let timer = null
            return function(...arg) {
                clearTimeout(timer)
                timer = setTimeout(() =>{
                    fn.call(this,...arg)
                },wait)
            }
        }
